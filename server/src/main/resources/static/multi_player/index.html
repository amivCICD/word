        <h1 class="text-2xl sm:text-4xl font-bold text-center text-black italic mx-auto hidden sm:flex">WORDLE</h1>

        </div>

          <span class="text-black italic">Current Players Turn: </span>

    <div class="w-full pt-2 sm:mt-10">
      <div class="my-1 flex justify-center gap-[1px] sm:gap-1 sm:text-xl font-bold select-none">
        <kbd data-key="Q" class="kbd text-pink-200 bg-black h-20">Q</kbd>
        <kbd data-key="W" class="kbd text-pink-200 bg-black h-20">W</kbd>
        <kbd data-key="E" class="kbd text-pink-200 bg-black h-20">E</kbd>
        <kbd data-key="R" class="kbd text-pink-200 bg-black h-20">R</kbd>
        <kbd data-key="T" class="kbd text-pink-200 bg-black h-20">T</kbd>
        <kbd data-key="Y" class="kbd text-pink-200 bg-black h-20">Y</kbd>
        <kbd data-key="U" class="kbd text-pink-200 bg-black h-20">U</kbd>
        <kbd data-key="I" class="kbd text-pink-200 bg-black h-20">I</kbd>
        <kbd data-key="O" class="kbd text-pink-200 bg-black h-20">O</kbd>
        <kbd data-key="P" class="kbd text-pink-200 bg-black h-20">P</kbd>
      </div>
      <div class="my-1 flex w-full justify-center gap-[1px] sm:gap-1 sm:text-xl font-bold select-none">
        <kbd data-key="A" class="kbd text-pink-200 bg-black h-20">A</kbd>

        <kbd data-key="L" class="kbd text-pink-200 bg-black h-20">L</kbd>
      </div>
      <div class="my-1 flex w-full justify-center gap-[1px] sm:gap-1 sm:text-xl font-bold select-none">
        <kbd id="enter" class="kbd text-pink-200 bg-black hover:cursor-pointer h-20">Enter</kbd>
        <kbd data-key="Z" class="kbd text-pink-200 bg-black h-20">Z</kbd>

        <kbd data-key="M" class="kbd text-pink-200 bg-black h-20">M</kbd>
        <kbd id="backspace" class="kbd text-pink-200 bg-black font-bold w-16 sm:w-[73px] hover:cursor-pointer h-20">&lBarr;</kbd>
      </div>
      <div class="items-center justify-center pt-6 sm:mt-5 pb-24 flex">
        <div id="startNewGameBtn" class="startNewGame btn p-2 rounded-md font-bold text-xl text-pink-300 bg-black hidden">Start New Game</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>






    <dialog id="failureModal" class="modal text-black"> <!--START NEW GAME-->
      <div class="modal-box bg-white border-4 border-pink-200">
        <h3 class="text-xl font-bold text-green-400">Nice try!</h3>
        <p class="py-4">The word of the day was: <span class="text-2xl sm:text-4xl text-pink-200 font-bold" id="wordOfTheDay"></span>!</p>
        <p class="text-lg font-bold text-green-400">Definition:</p>
        <p class="py-1 wordDefinition"></p>
        <div class="modal-action">
          <form method="dialog">
            <!-- <button class="startNewGame btn bg-white text-black border-4 border-pink-200 hover:text-pink-200">Start New Game</button> -->
            <button id="failureModalBtn" class="startNewGame btn bg-white text-black border-4 border-pink-200 hover:text-pink-200">Start New Game</button>
            <button class="btn bg-white text-black border-4 border-pink-200 hover:text-pink-200">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <dialog id="usernamePrompt" class="modal"><!--SET USERNAME INITIALLY && CONFIRM GAME CONTENTS-->
      <div class="modal-box bg-white border-4 border-pink-200">
        <h3 class="text-lg font-bold text-pink-300">Welcome!</h3>
        <div id="usernameMessage" class="py-4 text-pink-300 font-bold italic">
          Please enter a username:
          <span id="usernameRequiredToolTip" class="hidden border border-red-500 bg-white rounded-md p-1 text-red-500 font-bold italic text-xs h-12 w-fit fadeOut">
            A username is required!
          </span>
        </div>
        <div class="flex flex-col gap-4">
          <input id="usernameInput" type="text" maxlength="15" placeholder="enter chat username" class="input input-bordered w-full bg-transparent text-green-300 font-bold text-sm italic" />
          <div id="dynamicRoomIdDiv" class="hidden">
            <textarea id="roomIdReadOnly" type="text" maxlength="15" class="textarea textarea-bordered w-full h-12 bg-transparent text-green-300 font-bold text-md italic resize-none text-center" aria-expanded="false" readonly></textarea>
            <span class="text-sm italic bold text-green-300">Your game link</span>
          </div>
        </div>
        <div class="modal-action">
          <div id="copyGameToClipboard" class="btn bg-green-300 text-black border-4 border-pink-200 hover:text-pink-200 hidden">Copy Game Link</div>
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
                <div id="confirmUsernameBtn" class="btn bg-white text-black border-4 border-pink-200 hover:text-pink-200">Continue</div>
                <button id="startGameButton" class="btn bg-white text-black border-4 border-pink-200 hover:text-pink-200 hidden">Start Game</button>
                <!--this simply lets user continue-->
                <button id="modalClose" class="btn bg-white text-black border-4 border-pink-200 hover:text-pink-200 hidden">Start Game</button>

              </form>
        </div>
      </div>
    </dialog>
